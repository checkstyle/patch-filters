name: Commit Message

on:
  pull_request:
    branches: [ master ]

jobs:
  gitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install gitlint
        run: pip install gitlint

      - name: Run gitlint
        run: gitlint --commits ${{ github.event.pull_request.base.sha }}..${{ github.sha }}
